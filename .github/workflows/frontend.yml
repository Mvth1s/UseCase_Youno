name: Frontend CI

on:
  push:
    branches: [main, dev]
    paths:
      - "frontend/**"
  pull_request:
    branches: [main, dev]
    paths:
      - "frontend/**"

jobs:
  build:
    name: Install & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: https://usecase-youno.onrender.com
        run: npm run build

      - name: Verify dist
        working-directory: frontend
        run: test -f dist/index.html && echo "dist/index.html present" || exit 1
